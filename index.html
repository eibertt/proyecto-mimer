<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        iframe, ins, .adsbygoogle, #pago-movil-popup { display: none !important; }
        body { background-color: #f1f5f9; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
        
        .tab-content { display: none; height: calc(100vh - 85px); overflow-y: auto; padding: 20px; }
        .active-tab { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Tarjeta de Perfil Estilo Black Card */
        .profile-card {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border-radius: 28px; padding: 25px; color: white; position: relative;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
        }

        /* Botón Bóveda Play Store */
        .vault-sphere {
            width: 200px; height: 200px;
            background: #2563eb; border-radius: 50px;
            display: flex; align-items: center; justify-content: center;
            font-size: 70px; box-shadow: 0 20px 40px rgba(37, 99, 235, 0.3);
            cursor: pointer; transition: 0.2s; border: 5px solid white;
        }
        .vault-sphere:active { transform: scale(0.9); background: #1d4ed8; }

        /* Nav Bar Android 14 */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 85px;
            background: white; border-top: 1px solid #e2e8f0;
            display: flex; justify-content: space-around; padding-top: 10px;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 10px; font-weight: 800; cursor: pointer; }
        .nav-item.active { color: #2563eb; }
    </style>
</head>
<body>

    <div class="flex flex-col h-screen">
        
        <div id="tab-home" class="tab-content active-tab">
            <div class="flex justify-between items-center mb-10">
                <h1 class="text-2xl font-black text-slate-800">Titan <span class="text-blue-600">Cash</span></h1>
                <div class="bg-blue-600 text-white px-4 py-1 rounded-full font-bold shadow-lg">$ <span class="balance-val">0.00</span></div>
            </div>
            
            <div class="flex flex-col items-center py-6">
                <div onclick="openVault()" class="vault-sphere">🔒</div>
                <p class="mt-8 font-black text-slate-400 text-[10px] tracking-widest uppercase">Toca la bóveda para ganar</p>
                <p class="text-blue-500 font-bold text-xs mt-2">Recompensa: $0.15</p>
            </div>
        </div>

        <div id="tab-profile" class="tab-content">
            <h2 class="text-2xl font-black text-slate-900 mb-6">Mi Perfil</h2>
            <div class="profile-card mb-8">
                <div class="flex items-center gap-4">
                    <div class="w-14 h-14 bg-blue-500 rounded-full flex items-center justify-center text-2xl border-2 border-white/20">👤</div>
                    <div>
                        <h3 id="user-display" class="font-black text-lg">Cargando...</h3>
                        <p class="text-[10px] text-blue-300 font-bold uppercase">Miembro Verificado</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 mt-6 pt-6 border-t border-white/10">
                    <div>
                        <p class="text-[9px] text-slate-400 uppercase font-bold">Balance Actual</p>
                        <p class="text-xl font-black">$ <span class="balance-val">0.00</span></p>
                    </div>
                    <div>
                        <p class="text-[9px] text-slate-400 uppercase font-bold">Publicidad</p>
                        <p class="text-xl font-black" id="ad-count">0</p>
                    </div>
                </div>
            </div>

            <div class="space-y-3">
                <div onclick="tg.openLink('https://t.me/eiber0822')" class="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-100 shadow-sm">
                    <span class="font-bold text-sm text-slate-700">📢 Canal de Soporte</span>
                    <span class="text-blue-500 font-bold">❯</span>
                </div>
                <div onclick="tg.openLink('https://portaltecnohoy.blogspot.com')" class="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-100 shadow-sm">
                    <span class="font-bold text-sm text-slate-700">🌐 Portal Web</span>
                    <span class="text-blue-500 font-bold">❯</span>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="changeTab('tab-home', this)">
                <span class="text-2xl">⚡</span><span>HACK</span>
            </div>
            <div class="nav-item" onclick="changeTab('tab-profile', this)">
                <span class="text-2xl">👤</span><span>PERFIL</span>
            </div>
            <div class="nav-item" onclick="alert('Retiro mínimo: $10.00')">
                <span class="text-2xl">💰</span><span>COBRAR</span>
            </div>
        </nav>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = parseFloat(localStorage.getItem('titan_balance')) || 0.00;
        let ads = parseInt(localStorage.getItem('titan_ads')) || 0;

        function updateAllUI() {
            document.querySelectorAll('.balance-val').forEach(el => el.innerText = balance.toFixed(2));
            document.getElementById('ad-count').innerText = ads;
            if (tg.initDataUnsafe.user) {
                document.getElementById('user-display').innerText = tg.initDataUnsafe.user.first_name;
            } else {
                document.getElementById('user-display').innerText = "TITAN USER";
            }
        }

        function openVault() {
            tg.openLink('https://omg10.com/4/10663699');
            setTimeout(() => {
                balance += 0.15;
                ads += 1;
                localStorage.setItem('titan_balance', balance);
                localStorage.setItem('titan_ads', ads);
                updateAllUI();
                alert("¡Felicidades! +$0.15 añadidos.");
            }, 3000);
        }

        function changeTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active-tab');
            el.classList.add('active-tab');
        }

        updateAllUI();
    </script>
</body>
</html>
