<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TecnoHoy Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 15px; font-size: 18px; color: #f39c12; font-weight: bold; letter-spacing: 1px; }
        .score-container { font-size: 50px; font-weight: 800; margin-top: 10px; }
        .pph { color: #27ae60; font-size: 14px; margin-bottom: 20px; }
        .clicker-btn { width: 230px; height: 230px; border-radius: 50%; background: radial-gradient(#f1c40f, #d35400); border: 8px solid #a04000; cursor: pointer; margin: auto; display: flex; align-items: center; justify-content: center; font-size: 90px; transition: transform 0.05s; box-shadow: 0 0 40px rgba(243, 156, 18, 0.4); user-select: none; -webkit-tap-highlight-color: transparent; }
        .clicker-btn:active { transform: scale(0.92); }
        .tap-anim { position: absolute; color: #f1c40f; font-size: 30px; font-weight: bold; animation: out 0.7s ease-out forwards; pointer-events: none; }
        @keyframes out { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
        .tasks { background: #1a1a1a; padding: 20px; border-radius: 25px 25px 0 0; border-top: 1px solid #333; }
        .task-card { background: #252525; padding: 12px; margin: 8px 0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .btn-go { background: #27ae60; color: white; text-decoration: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>
    <div class="header">💎 TECNO-HOY COIN 💎</div>
    <div class="score-container" id="score">0</div>
    <div class="pph">Profit por hora: +<span id="pph-val">500</span></div>
    <div class="clicker-btn" id="btn">💎</div>
    <div class="tasks">
        <div class="task-card">
            <div style="text-align:left"><small>Misión Diaria</small><br><b>Visitar Blog</b></div>
            <a href="https://portaltecnohoy.blogspot.com/" target="_blank" class="btn-go" onclick="addReward(5000)">IR</a>
        </div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        let count = parseInt(localStorage.getItem('pts')) || 0;
        const scoreDiv = document.getElementById('score');
        
        function update() { 
            scoreDiv.innerText = Math.floor(count).toLocaleString(); 
            localStorage.setItem('pts', count);
        }
        
        document.getElementById('btn').addEventListener('click', (e) => {
            count++;
            update();
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            const txt = document.createElement('div');
            txt.innerText = '+1'; txt.className = 'tap-anim';
            txt.style.left = e.clientX + 'px'; txt.style.top = e.clientY + 'px';
            document.body.appendChild(txt);
            setTimeout(() => txt.remove(), 700);
        });

        setInterval(() => { count += 500/3600; update(); }, 1000);
        update();
        tg.expand();
    </script>
</body>
</html>
