<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TecnoHoy Cyber Tiger Ranking</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2fe;
            --neon-magenta: #ff00ff;
            --neon-gold: #f1c40f;
            --bg-dark: #050509;
        }

        body { background: var(--bg-dark); color: white; font-family: 'Orbitron', sans-serif; text-align: center; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        .header { padding: 10px; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); font-size: 10px; display: flex; justify-content: space-around; background: rgba(0,0,0,0.5); }
        
        .score-container { font-size: 42px; margin: 15px 0; color: var(--neon-gold); text-shadow: 0 0 15px rgba(241, 196, 15, 0.4); }

        .energy-container { width: 70%; margin: 5px auto; background: #222; height: 8px; border-radius: 10px; border: 1px solid var(--neon-blue); overflow: hidden; }
        .energy-bar { background: linear-gradient(90deg, var(--neon-blue), var(--neon-magenta)); height: 100%; width: 100%; transition: width 0.2s; }

        .main-view { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; position: relative; }
        .ranking-view { display: none; flex-grow: 1; padding: 20px; overflow-y: auto; }

        .cyber-tiger {
            width: 240px; height: 240px; margin: 0 auto;
            background-image: url('https://i.ibb.co/pP3V2mP/cyber-tiger.png');
            background-size: cover; background-position: center;
            border-radius: 50%; border: 4px solid var(--neon-magenta);
            box-shadow: 0 0 30px var(--neon-magenta);
            transition: transform 0.05s;
        }
        .cyber-tiger:active { transform: scale(0.92); }

        .nav-tabs { display: flex; background: #11111d; border-top: 2px solid var(--neon-blue); }
        .tab { flex: 1; padding: 15px; font-size: 12px; color: #888; cursor: pointer; transition: 0.3s; }
        .tab.active { color: var(--neon-blue); background: rgba(0, 242, 254, 0.1); font-weight: bold; }

        .rank-item { display: flex; justify-content: space-between; background: rgba(255,255,255,0.05); margin-bottom: 8px; padding: 12px; border-radius: 10px; border: 1px solid #222; }
        .rank-pos { color: var(--neon-magenta); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <span>📶 SERVER: BARINAS_VNZ</span>
        <span>⚡ LATENCY: 24ms</span>
    </div>
    
    <div class="score-container" id="score">0</div>

    <div id="gameView" class="main-view">
        <div style="font-size: 9px; color: var(--neon-blue); margin-bottom: 5px;">POTENCIA DE ATAQUE</div>
        <div class="energy-container"><div class="energy-bar" id="energyBar"></div></div>
        <div class="cyber-tiger" id="tiger"></div>
        <p style="font-size: 11px; color: #555; margin-top: 15px;">TOCA PARA ATACAR</p>
    </div>

    <div id="rankingView" class="ranking-view">
        <h2 style="color: var(--neon-blue); font-size: 18px;">TOP GUERREROS</h2>
        <div class="rank-item"><span class="rank-pos">#1</span> <span>Cyber_Boss</span> <span>9.5M</span></div>
        <div class="rank-item"><span class="rank-pos">#2</span> <span>Pixel_Hunter</span> <span>5.2M</span></div>
        <div class="rank-item"><span class="rank-pos">#3</span> <span>Venz_Warrior</span> <span>1.8M</span></div>
        <div class="rank-item" style="border: 1px solid var(--neon-gold);">
            <span style="color:var(--neon-gold)">TU</span> <span id="userName">Jugador</span> <span id="userRankScore">0</span>
        </div>
    </div>

    <div class="nav-tabs">
        <div class="tab active" onclick="showView('game')">COMBATE</div>
        <div class="tab" onclick="showView('rank')">RANKING</div>
        <div class="tab" onclick="window.open('TU_LINK_MONETAG_AQUI')">BONUS</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let pts = parseInt(localStorage.getItem('cyberPts')) || 0;
        let energy = 100;

        function update() {
            document.getElementById('score').innerText = pts.toLocaleString();
            document.getElementById('userRankScore').innerText = pts.toLocaleString();
            document.getElementById('energyBar').style.width = energy + '%';
            localStorage.setItem('cyberPts', pts);
        }

        document.getElementById('tiger').addEventListener('click', (e) => {
            if (energy >= 2) {
                pts += 15; energy -= 2; update();
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            }
        });

        function showView(v) {
            document.getElementById('gameView').style.display = v === 'game' ? 'flex' : 'none';
            document.getElementById('rankingView').style.display = v === 'rank' ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (i === 0 && v === 'game') || (i === 1 && v === 'rank'));
            });
        }

        setInterval(() => { if(energy < 100) { energy += 1; update(); } }, 1000);
        
        tg.expand();
        update();
    </script>
</body>
</html>
