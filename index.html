<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FUTURE ARCADE 3D - ULTRA HD</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #00ffff; font-size: 20px; font-weight: bold; pointer-events: none;
            text-shadow: 0 0 10px #00ffff; z-index: 10;
        }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.4) 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; color: #fff;
        }
        .btn {
            background: rgba(0, 255, 255, 0.1); border: 2px solid #00ffff;
            color: #00ffff; padding: 20px 40px; font-size: 20px; border-radius: 5px;
            cursor: pointer; text-transform: uppercase; box-shadow: 0 0 20px #00ffff;
        }
    </style>
</head>
<body>

<div id="ui">SCORE: <span id="score">0</span></div>

<div id="overlay">
    <h1 style="letter-spacing: 15px;">ULTRA 3D</h1>
    <button class="btn" id="startBtn">INICIAR SIMULACIÓN</button>
</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
</script>

<script type="module">
import * as THREE from 'three';

let scene, camera, renderer, player, clock;
let obstacles = [];
let isPaused = true;
let score = 0;

function init() {
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000000, 0.05); // Niebla para profundidad

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 8;
    camera.position.x = -2;

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Iluminación
    const ambient = new THREE.AmbientLight(0x404040, 2);
    scene.add(ambient);

    const light = new THREE.PointLight(0x00ffff, 10, 20);
    scene.add(light);
    
    // Jugador: Un cubo de cristal neón
    const geometry = new THREE.BoxGeometry(0.6, 0.6, 0.6);
    const material = new THREE.MeshPhongMaterial({ 
        color: 0x00ffff, 
        emissive: 0x00ffff, 
        transparent: true, 
        opacity: 0.8,
        shininess: 100 
    });
    player = new THREE.Mesh(geometry, material);
    player.position.set(-4, 0, 0);
    player.userData = { vy: 0 };
    scene.add(player);

    clock = new THREE.Clock();
}

function createObstacle() {
    const gap = 4;
    const topHeight = Math.random() * 6 + 1;
    
    const obsGeo = new THREE.BoxGeometry(1, topHeight, 1);
    const obsMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8, roughness: 0.2 });
    
    // Poste Superior
    const topObs = new THREE.Mesh(obsGeo, obsMat);
    topObs.position.set(15, 6, 0);
    
    // Poste Inferior
    const botObs = new THREE.Mesh(obsGeo, obsMat);
    botObs.position.set(15, -6, 0);

    const group = new THREE.Group();
    group.add(topObs, botObs);
    scene.add(group);
    obstacles.push({ mesh: group, passed: false });
}

function animate() {
    if(isPaused) return;
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    
    // Gravedad y Salto
    player.userData.vy -= 15 * delta;
    player.position.y += player.userData.vy * delta;

    // Rotación del jugador para realismo
    player.rotation.x += delta * 2;
    player.rotation.z += delta * 1.5;

    // Movimiento Obstáculos
    obstacles.forEach((obj, i) => {
        obj.mesh.position.x -= 8 * delta;

        // Colisión simple
        if(Math.abs(obj.mesh.position.x + 4) < 0.8) {
            if(player.position.y > 1.5 || player.position.y < -1.5) die();
        }

        if(!obj.passed && obj.mesh.position.x < -4) {
            obj.passed = true;
            score++;
            document.getElementById('score').innerText = score;
        }

        if(obj.mesh.position.x < -20) {
            scene.remove(obj.mesh);
            obstacles.splice(i, 1);
        }
    });

    if(Math.random() < 0.02) createObstacle();
    if(player.position.y > 6 || player.position.y < -6) die();

    renderer.render(scene, camera);
}

function die() {
    isPaused = true;
    document.getElementById('overlay').style.display = 'flex';
}

document.getElementById('startBtn').onclick = () => {
    isPaused = false;
    score = 0;
    document.getElementById('score').innerText = score;
    player.position.y = 0;
    player.userData.vy = 0;
    obstacles.forEach(o => scene.remove(o.mesh));
    obstacles = [];
    document.getElementById('overlay').style.display = 'none';
    animate();
};

window.addEventListener('touchstart', () => {
    if(!isPaused) player.userData.vy = 6;
});

init();
renderer.render(scene, camera);
</script>
</body>
</html>
