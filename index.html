<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tiger Kombat Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2fe; --magenta: #bc13fe; --gold: #ffcc00; --bg: #050508; }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        .header { display: flex; gap: 10px; padding: 15px; width: 90%; }
        .card {
            background: rgba(255,255,255,0.05); border: 1px solid var(--cyan);
            border-radius: 12px; padding: 10px; flex: 1; text-align: center;
        }
        .card small { display: block; font-size: 10px; color: var(--cyan); text-transform: uppercase; }
        .card b { font-family: 'Orbitron'; font-size: 14px; }
        
        .balance {
            font-family: 'Orbitron'; font-size: 55px; color: var(--gold);
            text-shadow: 0 0 25px rgba(255, 204, 0, 0.5); margin: 25px 0;
        }

        .tiger-container {
            position: relative; flex-grow: 1; display: flex; align-items: center; justify-content: center;
        }
        .tiger-circle {
            width: 270px; height: 270px; border-radius: 50%;
            border: 6px solid var(--cyan); box-shadow: 0 0 40px var(--cyan), inset 0 0 20px var(--cyan);
            cursor: pointer; transition: transform 0.1s;
            background: #000; display: flex; align-items: center; justify-content: center;
            overflow: hidden; z-index: 5;
        }
        .tiger-circle:active { transform: scale(0.92); }
        .tiger-circle img { width: 100%; height: 100%; object-fit: cover; }

        .aura {
            width: 330px; height: 330px; position: absolute; border-radius: 50%;
            background: radial-gradient(circle, rgba(188, 19, 254, 0.25) 0%, transparent 70%);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 0.5; } }

        .footer { width: 90%; padding-bottom: 40px; }
        .energy-bar {
            height: 14px; background: #1a1a1a; border-radius: 10px;
            border: 1px solid #333; overflow: hidden; margin-top: 8px;
        }
        .energy-fill {
            height: 100%; width: 100%; background: linear-gradient(90deg, var(--magenta), var(--cyan));
            box-shadow: 0 0 10px var(--cyan); transition: width 0.2s;
        }

        .floating-tap {
            position: absolute; color: white; font-family: 'Orbitron'; font-weight: 900;
            font-size: 32px; pointer-events: none; animation: fly 0.8s ease-out forwards;
            z-index: 100; text-shadow: 0 0 10px var(--cyan);
        }
        @keyframes fly { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-140px); opacity: 0; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="card"><small>Ataque</small><b>+25</b></div>
        <div class="card"><small>Profit/H</small><b style="color:var(--gold)">+12.8K</b></div>
    </div>

    <div class="balance" id="coins">0</div>

    <div class="tiger-container">
        <div class="aura"></div>
        <div class="tiger-circle" id="tapBtn">
            <img src="https://i.ibb.co/pP3V2mP/cyber-tiger.png" 
                 onerror="this.src='https://cdn-icons-png.flaticon.com/512/1998/1998810.png'" 
                 alt="Tiger">
        </div>
    </div>

    <div class="footer">
        <div style="display:flex; justify-content:space-between; font-size:13px; font-weight: bold;">
            <span>⚡ ENERGÍA ALPHA</span>
            <span id="energyText">1500 / 1500</span>
        </div>
        <div class="energy-bar"><div class="energy-fill" id="energyBar"></div></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let data = {
            coins: parseInt(localStorage.getItem('tiger_v4_coins')) || 0,
            energy: 1500,
            maxEnergy: 1500
        };

        function sync() {
            document.getElementById('coins').innerText = Math.floor(data.coins).toLocaleString();
            document.getElementById('energyBar').style.width = (data.energy / data.maxEnergy * 100) + '%';
            document.getElementById('energyText').innerText = `${data.energy} / ${data.maxEnergy}`;
            localStorage.setItem('tiger_v4_coins', data.coins);
        }

        document.getElementById('tapBtn').addEventListener('click', (e) => {
            if (data.energy >= 5) {
                data.coins += 25;
                data.energy -= 5;
                tg.HapticFeedback.impactOccurred('heavy');

                const t = document.createElement('div');
                t.innerText = '+25';
                t.className = 'floating-tap';
                t.style.left = e.clientX + 'px';
                t.style.top = e.clientY + 'px';
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 800);
                sync();
            }
        });

        setInterval(() => {
            if(data.energy < data.maxEnergy) data.energy += 3;
            data.coins += (12800 / 3600);
            sync();
        }, 1000);

        sync();
    </script>
</body>
</html>
