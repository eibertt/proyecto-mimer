<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f0f4f8; --dark: #d1d9e6; --light: #ffffff; --primary: #2563eb; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; }
        
        .neu-card {
            background: var(--bg); border-radius: 24px;
            box-shadow: 7px 7px 15px var(--dark), -7px -7px 15px var(--light);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .vault-sphere {
            width: 180px; height: 180px;
            background: linear-gradient(145deg, #2b6df5, #1e40af);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 60px; box-shadow: 12px 12px 25px #bebebe, -12px -12px 25px #ffffff;
            border: 6px solid var(--bg); transition: 0.2s; cursor: pointer; user-select: none;
        }
        .vault-sphere:active { transform: scale(0.95); box-shadow: inset 8px 8px 15px #1a368d; }

        .btn-action {
            background: var(--primary); color: white; padding: 12px 20px;
            border-radius: 16px; font-weight: 800; font-style: italic; border: none;
        }

        /* Barra de Progreso Neumórfica */
        .progress-container { background: #e0e5ec; border-radius: 10px; height: 12px; box-shadow: inset 4px 4px 8px #bec8d2, inset -4px -4px 8px #ffffff; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #3b82f6, #10b981); height: 100%; width: 0%; transition: width 0.5s ease; }

        .tab-content { display: none; height: calc(100vh - 100px); overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .active-tab { display: block; }
        
        .nav-item { cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: #2563eb; transform: translateY(-5px); }
    </style>
</head>
<body>

    <div class="h-screen flex flex-col">
        
        <div id="home" class="tab-content active-tab space-y-6">
            <header class="flex justify-between items-center">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Balance</p>
                    <h2 id="u-display" class="text-lg font-extrabold text-slate-800">TITAN USER</h2>
                </div>
                <div class="neu-card px-4 py-2 text-blue-600 font-extrabold">$ <span class="bal-txt">0.00</span></div>
            </header>

            <div class="flex flex-col items-center py-4">
                <div class="vault-sphere" onclick="openVault()">🔒</div>
                <p class="mt-6 text-blue-600 font-bold text-xs">Gana $0.15 por apertura</p>
            </div>

            <div class="neu-card p-5 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">⚡</span>
                    <div>
                        <p class="text-[9px] font-bold text-slate-400 uppercase">Anuncio</p>
                        <p class="text-xs font-extrabold">Direct Link Activo</p>
                    </div>
                </div>
                <button onclick="window.open('https://omg10.com')" class="btn-action text-[10px]">VER AD</button>
            </div>
        </div>

        <div id="withdraw" class="tab-content space-y-6">
            <h2 class="text-2xl font-black italic text-slate-800">Retirar <span class="text-blue-600">Dinero</span></h2>
            
            <div class="neu-card p-6">
                <div class="flex justify-between items-center mb-4">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Progreso de Pago</p>
                    <p class="font-black text-blue-600">$ <span class="bal-txt">0.00</span> / $10.00</p>
                </div>
                <div class="progress-container">
                    <div id="bar-fill" class="progress-fill"></div>
                </div>
                <p class="text-[9px] text-slate-400 mt-3 font-medium">Mínimo requerido: $10.00 USD</p>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div class="neu-card p-4 text-center cursor-pointer active:shadow-inner"><span class="text-xl">💳</span><p class="text-[8px] font-bold mt-1 uppercase">Pago Móvil</p></div>
                <div class="neu-card p-4 text-center cursor-pointer active:shadow-inner"><span class="text-xl">🅿️</span><p class="text-[8px] font-bold mt-1 uppercase">PayPal</p></div>
                <div class="neu-card p-4 text-center cursor-pointer active:shadow-inner"><span class="text-xl">🪙</span><p class="text-[8px] font-bold mt-1 uppercase">Binance</p></div>
            </div>

            <button id="btn-request" class="w-full bg-slate-300 text-slate-500 py-4 rounded-2xl font-black text-xs uppercase shadow-md" disabled>Solicitar Pago</button>
        </div>

        <div id="profile" class="tab-content space-y-6">
            <div class="neu-card p-8 text-center">
                <div class="w-16 h-16 bg-blue-100 rounded-full mx-auto mb-3 flex items-center justify-center text-2xl">👤</div>
                <h3 class="font-extrabold text-slate-800 uppercase text-sm">TITAN ID #8822</h3>
            </div>
            
            <div onclick="window.open('https://portaltecnohoy.blogspot.com')" class="neu-card p-5 flex justify-between items-center cursor-pointer">
                <span class="font-bold text-xs text-slate-700">🌐 Visitar Portal Web</span>
                <span class="text-blue-500 font-black">❯</span>
            </div>
        </div>

        <nav class="fixed bottom-6 left-6 right-6 h-20 bg-white/80 backdrop-blur-md rounded-[30px] shadow-2xl flex justify-around items-center border border-white/50 z-50">
            <div onclick="switchTab('home', this)" class="nav-item active flex flex-col items-center"><span class="text-xl">🏠</span><span class="text-[9px] font-bold">INICIO</span></div>
            <div onclick="switchTab('withdraw', this)" class="nav-item flex flex-col items-center"><span class="text-xl">💸</span><span class="text-[9px] font-bold">RETIRO</span></div>
            <div onclick="switchTab('profile', this)" class="nav-item flex flex-col items-center"><span class="text-xl">👤</span><span class="text-[9px] font-bold">PERFIL</span></div>
        </nav>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let balance = parseFloat(localStorage.getItem('titan_bal_v2')) || 0;

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-tab');
            el.classList.add('active');
        }

        function openVault() {
            balance += 0.15;
            localStorage.setItem('titan_bal_v2', balance);
            updateUI();
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
        }

        function updateUI() {
            document.querySelectorAll('.bal-txt').forEach(e => e.innerText = balance.toFixed(2));
            
            let progress = (balance / 10) * 100;
            document.getElementById('bar-fill').style.width = Math.min(progress, 100) + '%';
            
            let btn = document.getElementById('btn-request');
            if(balance >= 10) {
                btn.disabled = false;
                btn.classList.replace('bg-slate-300', 'bg-blue-600');
                btn.classList.replace('text-slate-500', 'text-white');
            }
        }
        
        window.onload = () => {
            document.getElementById('u-display').innerText = tg.initDataUnsafe.user?.first_name || "TITAN USER";
            updateUI();
        };
    </script>
</body>
</html>
