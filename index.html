<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN CASH - App</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .app-shell { height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        
        /* Cabecera */
        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: bold; color: #00ffcc; text-shadow: 0 0 10px #00ffcc; }
        
        /* Tarjeta de Balance */
        .balance-card {
            width: 100%;
            background: linear-gradient(135deg, #111 0%, #222 100%);
            border: 1px solid #00ffcc;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            margin-bottom: 20px;
        }
        .balance-label { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .balance-value { font-size: 48px; font-weight: bold; margin: 10px 0; color: #fff; }
        
        /* Botones de Acción */
        .action-grid { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .btn {
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 15px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }
        .btn:active { background: #00ffcc; color: #000; border-color: #00ffcc; }
        .btn-main { background: #00ffcc; color: #000; font-weight: bold; grid-column: span 2; }

        /* Lista de Tareas */
        .tasks { width: 100%; flex-grow: 1; overflow-y: auto; }
        .task-card {
            background: #111;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #00ffcc;
        }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="header">
        <div class="logo">TITAN CASH</div>
        <div style="font-size: 20px;">👤</div>
    </div>

    <div class="balance-card">
        <div class="balance-label">Balance Total</div>
        <div class="balance-value">$<span id="balance">0.00</span></div>
        <div style="font-size: 12px; color: #00ffcc;">+12% este mes</div>
    </div>

    <div class="action-grid">
        <button class="btn btn-main" onclick="addMoney(5.00)">RECLAMAR BONO DIARIO</button>
        <button class="btn" onclick="alert('Mínimo de retiro: $100')">RETIRAR</button>
        <button class="btn" onclick="location.reload()">ACTUALIZAR</button>
    </div>

    <div class="tasks">
        <div class="task-card" onclick="addMoney(1.50)">
            <div>
                <div style="font-weight: bold;">Tarea de Redes</div>
                <div style="font-size: 11px; color: #888;">Seguir en Instagram</div>
            </div>
            <div style="color: #00ffcc; font-weight: bold;">+$1.50</div>
        </div>
        
        <div class="task-card" onclick="addMoney(2.00)">
            <div>
                <div style="font-weight: bold;">Encuesta Rápida</div>
                <div style="font-size: 11px; color: #888;">3 preguntas de prueba</div>
            </div>
            <div style="color: #00ffcc; font-weight: bold;">+$2.00</div>
        </div>
    </div>
</div>

<script>
    let currentBalance = parseFloat(localStorage.getItem('titan_balance')) || 0.00;
    document.getElementById('balance').innerText = currentBalance.toFixed(2);

    function addMoney(amount) {
        currentBalance += amount;
        document.getElementById('balance').innerText = currentBalance.toFixed(2);
        localStorage.setItem('titan_balance', currentBalance);
        
        // Efecto visual de brillo al ganar dinero
        document.querySelector('.balance-card').style.boxShadow = "0 0 30px rgba(0, 255, 204, 0.6)";
        setTimeout(() => {
            document.querySelector('.balance-card').style.boxShadow = "0 0 20px rgba(0, 255, 204, 0.2)";
        }, 300);
    }
</script>
</body>
</html>
