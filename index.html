<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tiger Kombat Omega</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2fe; --magenta: #bc13fe; --gold: #ffcc00; --bg: #050508; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        /* Panel de Estadísticas basado en tus diseños anteriores */
        .header { display: flex; gap: 8px; padding: 15px; width: 95%; margin-top: 10px; }
        .card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(0,242,254,0.3);
            border-radius: 12px; padding: 8px; flex: 1; text-align: center;
        }
        .card small { display: block; font-size: 10px; color: var(--cyan); text-transform: uppercase; }
        .card b { font-family: 'Orbitron'; font-size: 13px; }

        /* Contador de Tiger Coins (Tu estado 'tigerCoins') */
        .balance {
            font-family: 'Orbitron'; font-size: 55px; color: var(--gold);
            text-shadow: 0 0 25px rgba(255, 204, 0, 0.5); margin: 20px 0;
        }

        .main-container {
            position: relative; flex-grow: 1; display: flex; align-items: center; justify-content: center;
        }
        
        /* El botón de Tap optimizado para móviles */
        .tiger-button {
            width: 280px; height: 280px; border-radius: 50%;
            border: 5px solid var(--cyan); box-shadow: 0 0 40px var(--cyan);
            cursor: pointer; transition: transform 0.1s;
            background: radial-gradient(circle, #111, #000);
            display: flex; align-items: center; justify-content: center; z-index: 10;
        }
        .tiger-button:active { transform: scale(0.93); }
        .tiger-button svg { width: 160px; height: 160px; fill: var(--cyan); filter: drop-shadow(0 0 10px var(--cyan)); }

        .footer { width: 90%; padding-bottom: 40px; }
        .energy-bar { height: 12px; background: #1a1a1a; border-radius: 10px; border: 1px solid #333; overflow: hidden; }
        .energy-fill { 
            height: 100%; width: 100%; background: linear-gradient(90deg, var(--magenta), var(--cyan));
            box-shadow: 0 0 15px var(--cyan); transition: width 0.2s;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="card"><small>Ataque</small><b>+1</b></div>
        <div class="card"><small>Rango</small><b>ALFA</b></div>
    </div>

    <div class="balance" id="coinCounter">0</div>

    <div class="main-container">
        <div class="tiger-button" id="tapBtn">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>
        </div>
    </div>

    <div class="footer">
        <p style="text-align: center; font-size: 12px; color: var(--cyan);">TOCA AL TIGRE PARA GANAR</p>
        <div class="energy-bar"><div class="energy-fill" style="width: 100%;"></div></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Lógica de React convertida a JS puro para compatibilidad directa
        let tigerCoins = parseInt(localStorage.getItem('tiger_coins_save')) || 0;

        const updateDisplay = () => {
            document.getElementById('coinCounter').innerText = tigerCoins;
            localStorage.setItem('tiger_coins_save', tigerCoins);
        };

        // Tu función handleTap mejorada con Haptic Feedback
        document.getElementById('tapBtn').addEventListener('touchstart', (e) => {
            tigerCoins += 1;
            tg.HapticFeedback.impactOccurred('medium');
            updateDisplay();
        });

        updateDisplay();
    </script>
</body>
</html>
