<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f0f4f8; --dark: #d1d9e6; --light: #ffffff; --primary: #2563eb; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; }
        
        /* Efecto Neumórfico */
        .neu-card {
            background: var(--bg); border-radius: 24px;
            box-shadow: 7px 7px 15px var(--dark), -7px -7px 15px var(--light);
            border: 1px solid rgba(255,255,255,0.5);
        }

        /* Bóveda Pro Actualizada */
        .vault-sphere {
            width: 200px; height: 200px;
            background: linear-gradient(145deg, #2b6df5, #1e40af);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 70px; box-shadow: 15px 15px 30px #bebebe, -15px -15px 30px #ffffff;
            border: 8px solid var(--bg); transition: 0.2s; cursor: pointer; user-select: none;
        }
        .vault-sphere:active { transform: scale(0.95); box-shadow: inset 10px 10px 20px #1a368d; }

        .btn-action {
            background: var(--primary); color: white; padding: 12px 24px;
            border-radius: 16px; font-weight: 800; font-style: italic;
            box-shadow: 4px 4px 10px rgba(37, 99, 235, 0.3); border: none;
        }

        #splash {
            position: fixed; inset: 0; background: #0f172a; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s ease;
        }

        .tab-content { display: none; height: calc(100vh - 100px); overflow-y: auto; padding: 20px; }
        .active-tab { display: block; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="text-7xl mb-4 animate-bounce">💎</div>
        <h1 class="text-white text-3xl font-extrabold italic tracking-tighter">TITAN <span class="text-blue-500">CASH</span></h1>
        <div class="mt-8 w-12 h-1 bg-gray-800 rounded-full overflow-hidden">
            <div class="bg-blue-500 h-full w-1/2 animate-[load_2s_infinite]"></div>
        </div>
        <style>@keyframes load { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }</style>
    </div>

    <div class="h-screen flex flex-col">
        
        <div id="home" class="tab-content active-tab space-y-8">
            <header class="flex justify-between items-center">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Balance Actual</p>
                    <h2 id="u-display" class="text-xl font-extrabold text-slate-800 tracking-tight">TITAN USER</h2>
                </div>
                <div class="neu-card px-4 py-2 text-blue-600 font-extrabold text-lg">$ <span class="bal-txt">0.00</span></div>
            </header>

            <div class="flex flex-col items-center py-6">
                <div class="vault-sphere" onclick="openVault()">🔒</div>
                <div class="mt-8 text-center">
                    <p class="text-blue-600 font-bold text-sm">Gana $0.15 por apertura</p>
                </div>
            </div>

            <div class="neu-card p-5 flex items-center justify-between">
                <div>
                    <p class="text-[9px] font-bold text-slate-400 uppercase">Anuncio Disponible</p>
                    <p class="text-sm font-extrabold text-slate-800">Direct Link Activo</p>
                </div>
                <button onclick="window.open('https://omg10.com')" class="btn-action text-xs">VER AD</button>
            </div>
        </div>

        <div id="profile" class="tab-content space-y-6">
            <div class="neu-card p-8 text-center">
                <div class="w-20 h-20 bg-blue-100 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl">👤</div>
                <h3 class="text-xl font-extrabold text-slate-800 uppercase">Panel de Control</h3>
            </div>
            
            <div onclick="window.open('https://portaltecnohoy.blogspot.com')" class="neu-card p-5 flex justify-between items-center cursor-pointer">
                <span class="font-bold text-sm text-slate-700">🌐 Visitar Portal Web</span>
                <span class="text-blue-500 font-black">❯</span>
            </div>

            <div onclick="window.open('https://t.me')" class="neu-card p-5 flex justify-between items-center cursor-pointer">
                <span class="font-bold text-sm text-slate-700">📢 Canal de Telegram</span>
                <span class="text-blue-500 font-black">❯</span>
            </div>
        </div>

        <nav class="fixed bottom-6 left-6 right-6 h-20 bg-white/80 backdrop-blur-md rounded-[30px] shadow-2xl flex justify-around items-center border border-white/50">
            <button onclick="switchTab('home')" class="flex flex-col items-center text-blue-600">
                <span class="text-2xl">🏠</span><span class="text-[9px] font-bold">INICIO</span>
            </button>
            <button onclick="switchTab('profile')" class="flex flex-col items-center text-slate-400">
                <span class="text-2xl">👤</span><span class="text-[9px] font-bold">PERFIL</span>
            </button>
        </nav>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let balance = parseFloat(localStorage.getItem('titan_bal_v2')) || 0;

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => document.getElementById('splash').style.display = 'none', 600);
                document.getElementById('u-display').innerText = tg.initDataUnsafe.user?.first_name || "TITAN USER";
                updateUI();
            }, 2000);
        };

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active-tab');
        }

        function openVault() {
            balance += 0.15;
            localStorage.setItem('titan_bal_v2', balance);
            updateUI();
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
        }

        function updateUI() {
            document.querySelectorAll('.bal-txt').forEach(e => e.innerText = balance.toFixed(2));
        }
    </script>
</body>
</html>
