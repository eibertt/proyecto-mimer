import React, { useState } from 'react';

const JuegoTigreAlfa = () => {
  const [tigerCoins, setTigerCoins] = useState(0);

  const handleTap = () => {
    setTigerCoins(tigerCoins + 1);
  };

  return (
    <div>
      <h1>Tigre Alfa - Tap to Earn</h1>
      <button onClick={handleTap}>Toca al Tigre para ganar Tiger Coins</button>
      <p>Tiger Coins: {tigerCoins}</p>
    </div>
  );
};

export default JuegoTigreAlfa;
