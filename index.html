<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titan Cash - Dashboard</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; background: #0a0a0a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .app-container { width: 90%; max-width: 400px; background: #1a1a1a; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        .header { text-align: center; margin-bottom: 30px; }
        .balance-card { background: linear-gradient(135deg, #00b09b, #96c93d); padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 25px; }
        .balance-title { font-size: 14px; opacity: 0.9; text-transform: uppercase; }
        .balance-amount { font-size: 36px; font-weight: bold; margin: 10px 0; }
        .task-list { margin-top: 20px; }
        .task-item { background: #252525; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .task-item:active { transform: scale(0.98); }
        .btn-withdraw { width: 100%; background: #fff; color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px; }
        .status { font-size: 12px; color: #00ff00; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h2 style="color: #00b09b;">TITAN CASH</h2>
        <p style="font-size: 12px; color: #888;">ID: 9823-TX-2026</p>
    </div>

    <div class="balance-card">
        <div class="balance-title">Saldo Disponible</div>
        <div class="balance-amount">$<span id="balance">12.50</span></div>
        <div style="font-size: 11px;">Mínimo de retiro: $50.00</div>
    </div>

    <div class="task-list">
        <div class="task-item" onclick="completeTask(0.50)">
            <span>Ver Anuncio Premium</span>
            <span style="color: #96c93d;">+$0.50</span>
        </div>
        <div class="task-item" onclick="completeTask(1.20)">
            <span>Instalar App Sugerida</span>
            <span style="color: #96c93d;">+$1.20</span>
        </div>
        <div class="task-item" onclick="completeTask(0.10)">
            <span>Check-in Diario</span>
            <span style="color: #96c93d;">+$0.10</span>
        </div>
    </div>

    <button class="btn-withdraw" onclick="withdraw()">SOLICITAR RETIRO</button>
    <div id="msg" class="status"></div>
</div>

<script>
    let currentBalance = 12.50;

    function completeTask(amount) {
        currentBalance += amount;
        document.getElementById('balance').innerText = currentBalance.toFixed(2);
        showMsg("¡Tarea completada con éxito!");
    }

    function withdraw() {
        if(currentBalance < 50) {
            alert("Saldo insuficiente. Necesitas al menos $50.00 para retirar via PayPal o Cripto.");
        } else {
            showMsg("Procesando solicitud de retiro...");
        }
    }

    function showMsg(text) {
        const m = document.getElementById('msg');
        m.innerText = text;
        setTimeout(() => m.innerText = "", 3000);
    }
</script>
</body>
</html>
