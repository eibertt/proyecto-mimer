<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tiger Kombat Pro - Adsgram Edition</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.adsgram.ai/sdk.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neonCyan: '#00f2fe',
                        neonMagenta: '#bc13fe',
                        neonGold: '#ffcc00',
                        darkSpace: '#050508',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap');
        body { font-family: 'Rajdhani', sans-serif; background-color: #050508; color: white; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function TigerGame() {
            // Estado basado en tu esquema de base de datos
            const [coins, setCoins] = useState(0);
            const [energy, setEnergy] = useState(100);
            const [level, setLevel] = useState(1);
            
            const tg = window.Telegram.WebApp;

            // Inicializar Adsgram (Paso 2 de tu integración)
            const AdController = window.Adsgram ? new window.Adsgram({
                blockId: "TU_AD_UNIT_ID", // Reemplaza con tu ID real
                debug: true
            }) : null;

            useEffect(() => {
                tg.ready();
                tg.expand();
                const saved = JSON.parse(localStorage.getItem('tiger_db_v6'));
                if (saved) {
                    setCoins(saved.coins);
                    setEnergy(saved.energy);
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('tiger_db_v6', JSON.stringify({ coins, energy }));
            }, [coins, energy]);

            // Manejo de Recompensas (Paso 3 de tu integración)
            const showVideoAd = async () => {
                if (AdController) {
                    try {
                        const result = await AdController.show();
                        if (result.done) {
                            setEnergy(prev => Math.min(100, prev + 50));
                            tg.HapticFeedback.notificationOccurred('success');
                        }
                    } catch (err) {
                        console.error("Error al cargar anuncio:", err);
                    }
                }
            };

            const handleTap = (e) => {
                if (energy > 0) {
                    setCoins(prev => prev + 1);
                    setEnergy(prev => prev - 1);
                    tg.HapticFeedback.impactOccurred('medium');
                } else {
                    tg.HapticFeedback.notificationOccurred('error');
                }
            };

            return (
                <div className="flex flex-col items-center justify-between h-screen p-6 select-none">
                    {/* Header - Stats (Basado en users table) */}
                    <div className="w-full flex justify-between gap-4">
                        <div className="bg-white/5 border border-neonCyan/30 rounded-xl p-3 flex-1 text-center">
                            <span className="text-[10px] text-neonCyan block">NIVEL</span>
                            <b className="font-orbitron">{level}</b>
                        </div>
                        <div className="bg-white/5 border border-neonGold/30 rounded-xl p-3 flex-1 text-center">
                            <span className="text-[10px] text-neonGold block">ALPHA COINS</span>
                            <b className="font-orbitron text-neonGold">{coins.toLocaleString()}</b>
                        </div>
                    </div>

                    {/* Main Area (Tap to Earn) */}
                    <div className="relative flex items-center justify-center">
                        <div className="absolute w-72 h-72 bg-neonCyan/10 rounded-full blur-3xl animate-pulse"></div>
                        <button 
                            onPointerDown={handleTap}
                            className="relative w-64 h-64 bg-black border-4 border-neonCyan rounded-full shadow-[0_0_30px_#00f2fe] active:scale-90 transition-transform flex items-center justify-center overflow-hidden"
                        >
                            <svg viewBox="0 0 24 24" className="w-40 h-40 fill-neonCyan drop-shadow-[0_0_8px_#00f2fe]">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
                            </svg>
                        </button>
                    </div>

                    {/* Footer - Energy & Ads (Paso 1 y 4) */}
                    <div className="w-full space-y-4 mb-8">
                        <div className="flex justify-between items-end text-sm font-bold">
                            <span className="flex items-center gap-1">⚡ ENERGÍA</span>
                            <span className="text-neonCyan">{energy}/100</span>
                        </div>
                        <div className="h-3 bg-white/10 rounded-full border border-white/5 overflow-hidden">
                            <div 
                                className="h-full bg-gradient-to-r from-neonMagenta to-neonCyan transition-all duration-300"
                                style={{ width: `${energy}%` }}
                            ></div>
                        </div>
                        
                        <button 
                            onClick={showVideoAd}
                            className="w-full py-3 bg-neonGold/10 border border-neonGold text-neonGold rounded-xl font-orbitron text-xs hover:bg-neonGold/20 active:scale-95 transition"
                        >
                            Ver anuncio por +50 energía 📺
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TigerGame />);
    </script>
</body>
</html>
