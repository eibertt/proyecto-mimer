<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tiger Kombat Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f2fe;
            --magenta: #bc13fe;
            --gold: #ffcc00;
            --bg: #050508;
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh;
            display: flex; flex-direction: column;
        }

        /* Top Bar Estilo Profesional */
        .top-nav {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
            padding: 15px; background: rgba(255,255,255,0.03); backdrop-filter: blur(15px);
        }

        .card-mini {
            background: rgba(0,0,0,0.6); border: 1px solid rgba(0,242,254,0.3);
            border-radius: 10px; padding: 5px; text-align: center;
        }

        .card-mini span { display: block; font-size: 9px; color: var(--cyan); }
        .card-mini b { font-size: 12px; color: white; font-family: 'Orbitron'; }

        /* Score */
        .score-box {
            text-align: center; padding: 20px 0;
            font-family: 'Orbitron'; font-size: 48px; font-weight: 900;
            color: var(--gold); text-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
        }

        /* ÁREA DE COMBATE */
        .combat-zone {
            flex-grow: 1; display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        .aura {
            width: 300px; height: 300px; border-radius: 50%;
            background: radial-gradient(circle, rgba(188, 19, 254, 0.2) 0%, transparent 70%);
            position: absolute; animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 0.5; } }

        .main-target {
            width: 260px; height: 260px; border-radius: 50%;
            border: 5px solid var(--cyan); position: relative;
            box-shadow: 0 0 50px var(--cyan), inset 0 0 30px var(--cyan);
            cursor: pointer; transition: transform 0.05s; z-index: 10;
            background: #000; overflow: hidden;
        }

        .main-target:active { transform: scale(0.92); }

        .main-target img {
            width: 100%; height: 100%; object-fit: cover;
            filter: drop-shadow(0 0 15px var(--magenta));
        }

        /* Footer & Energy */
        .status-footer {
            padding: 20px; background: linear-gradient(to top, #000, transparent);
        }

        .energy-container { margin-bottom: 15px; }
        .energy-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
        .bar-outer { height: 12px; background: #111; border-radius: 10px; border: 1px solid #333; overflow: hidden; }
        .bar-inner { 
            height: 100%; width: 100%; 
            background: linear-gradient(90deg, var(--magenta), var(--cyan));
            box-shadow: 0 0 10px var(--cyan); transition: width 0.3s;
        }

        .menu-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
        }

        .menu-btn {
            background: rgba(255,255,255,0.05); padding: 12px 5px; border-radius: 12px;
            text-align: center; font-size: 10px; color: #aaa; border: 1px solid transparent;
        }

        .menu-btn.active { color: var(--cyan); border-color: var(--cyan); background: rgba(0, 242, 254, 0.1); }

        /* Tap Effect */
        .tap-anim {
            position: absolute; color: white; font-family: 'Orbitron';
            font-size: 28px; pointer-events: none; animation: tapFly 0.8s ease-out forwards;
            z-index: 100; text-shadow: 0 0 10px var(--cyan);
        }
        @keyframes tapFly { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-120px) scale(1.5); opacity: 0; } }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="card-mini"><span>ATAQUE</span><b id="tapVal">+12</b></div>
        <div class="card-mini"><span>P/HORA</span><b style="color:var(--gold)">+5.2K</b></div>
        <div class="card-mini"><span>SERVER</span><b>VNZ_01</b></div>
    </div>

    <div class="score-box" id="coins">0</div>

    <div class="combat-zone">
        <div class="aura"></div>
        <div class="main-target" id="tigerTap">
            <img src="https://i.ibb.co/pP3V2mP/cyber-tiger.png" 
                 onerror="this.src='https://cdn-icons-png.flaticon.com/512/1998/1998810.png'" 
                 alt="Alpha Tiger">
        </div>
    </div>

    <div class="status-footer">
        <div class="energy-container">
            <div class="energy-header">
                <span>⚡ POTENCIA ALPHA</span>
                <span id="energyNum">1500 / 1500</span>
            </div>
            <div class="bar-outer"><div class="bar-inner" id="energyBar"></div></div>
        </div>

        <div class="menu-grid">
            <div class="menu-btn active">WAR</div>
            <div class="menu-btn" onclick="tg.showAlert('Minería activa: +5.2K/h')">MINE</div>
            <div class="menu-btn" onclick="tg.showAlert('Invita a tu clan')">FRIENDS</div>
            <div class="menu-btn" onclick="tg.showAlert('Airdrop próximamente')">WALLET</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let data = {
            coins: parseInt(localStorage.getItem('tk_coins')) || 0,
            energy: 1500,
            maxEnergy: 1500
        };

        function sync() {
            document.getElementById('coins').innerText = Math.floor(data.coins).toLocaleString();
            document.getElementById('energyBar').style.width = (data.energy / data.maxEnergy * 100) + '%';
            document.getElementById('energyNum').innerText = `${data.energy} / ${data.maxEnergy}`;
            localStorage.setItem('tk_coins', data.coins);
        }

        document.getElementById('tigerTap').addEventListener('click', (e) => {
            if (data.energy >= 4) {
                data.coins += 12;
                data.energy -= 4;
                
                tg.HapticFeedback.impactOccurred('rigid');

                // Animación de texto
                const t = document.createElement('div');
                t.innerText = '+12';
                t.className = 'tap-anim';
                t.style.left = e.clientX + 'px';
                t.style.top = e.clientY + 'px';
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 800);
                
                sync();
            }
        });

        // Regeneración y Ganancia Pasiva
        setInterval(() => {
            if(data.energy < data.maxEnergy) data.energy += 2;
            data.coins += (5200 / 3600); // 5.2K por hora
            sync();
        }, 1000);

        sync();
    </script>
</body>
</html>
