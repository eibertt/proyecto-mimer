<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tiger Empire - Cyber Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2fe;
            --neon-purple: #bc13fe;
            --gold: #ffcc00;
            --dark-bg: #030305;
        }

        body {
            margin: 0;
            background: var(--dark-bg);
            color: white;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #030305 100%);
        }

        /* Header con efecto de cristal */
        .top-stats {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 242, 254, 0.2);
        }

        .stat-item { text-align: center; }
        .stat-label { font-size: 9px; color: var(--neon-cyan); letter-spacing: 1px; }
        .stat-value { font-size: 14px; color: white; font-weight: 900; }

        .main-score {
            font-size: 52px;
            font-weight: 900;
            margin: 30px 0;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* ÁREA DEL TIGRE - ESTILO PIXELVERSE */
        .character-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .tiger-shield {
            width: 280px;
            height: 280px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            border: 4px solid var(--neon-cyan);
            box-shadow: 0 0 40px var(--neon-cyan), inset 0 0 20px var(--neon-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.05s;
        }

        .tiger-shield:active { transform: scale(0.92); }

        .tiger-shield img {
            width: 85%;
            filter: drop-shadow(0 0 10px var(--neon-purple));
        }

        /* Barra de Energía Neón */
        .footer-panel {
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            border-top: 1px solid var(--neon-purple);
        }

        .energy-wrapper { width: 100%; margin-bottom: 20px; }
        .energy-label { font-size: 11px; margin-bottom: 5px; color: var(--neon-purple); }
        .energy-bar-bg {
            height: 14px;
            background: #111;
            border-radius: 20px;
            border: 1px solid #333;
            overflow: hidden;
        }
        .energy-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan));
            box-shadow: 0 0 15px var(--neon-cyan);
            transition: width 0.3s;
        }

        /* Menú Inferior */
        .bottom-nav {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 10px;
            font-size: 10px;
            color: #666;
            border: 1px solid transparent;
        }
        .nav-btn.active {
            color: var(--neon-cyan);
            border-color: var(--neon-cyan);
            background: rgba(0, 242, 254, 0.1);
        }

        /* Efecto de clic */
        .plus-one {
            position: absolute;
            color: var(--neon-cyan);
            font-weight: 900;
            font-size: 32px;
            pointer-events: none;
            animation: moveUp 0.8s ease-out forwards;
            text-shadow: 0 0 10px var(--neon-cyan);
        }
        @keyframes moveUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-150px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="top-stats">
        <div class="stat-item">
            <div class="stat-label">GANANCIA/HORA</div>
            <div class="stat-value" id="pph">+2.5K 💎</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">RANGO</div>
            <div class="stat-value" style="color: var(--neon-purple);">ALFA</div>
        </div>
    </div>

    <div class="main-score" id="balance">0</div>

    <div class="character-container">
        <div class="tiger-shield" id="mainButton">
            <img src="https://i.ibb.co/pP3V2mP/cyber-tiger.png" alt="Tiger">
        </div>
    </div>

    <div class="footer-panel">
        <div class="energy-wrapper">
            <div class="energy-label">⚡ POTENCIA: <span id="energyNum">1000</span></div>
            <div class="energy-bar-bg">
                <div class="energy-fill" id="energyBar"></div>
            </div>
        </div>
        <div class="bottom-nav">
            <div class="nav-btn active">COMBATE</div>
            <div class="nav-btn">MINAR</div>
            <div class="nav-btn">EQUIPO</div>
            <div class="nav-btn">AIRDROP</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let coins = parseInt(localStorage.getItem('tiger_coins')) || 0;
        let energy = 1000;

        function update() {
            document.getElementById('balance').innerText = Math.floor(coins).toLocaleString();
            document.getElementById('energyBar').style.width = (energy / 10) + '%';
            document.getElementById('energyNum').innerText = energy;
            localStorage.setItem('tiger_coins', coins);
        }

        document.getElementById('mainButton').addEventListener('click', (e) => {
            if (energy >= 2) {
                coins += 10;
                energy -= 2;
                
                // Feedback
                tg.HapticFeedback.impactOccurred('medium');

                // Efecto visual
                const p = document.createElement('div');
                p.innerText = '+10';
                p.className = 'plus-one';
                p.style.left = e.clientX + 'px';
                p.style.top = e.clientY + 'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
                
                update();
            }
        });

        // Recarga energía
        setInterval(() => {
            if(energy < 1000) energy++;
            update();
        }, 1500);

        update();
    </script>
</body>
</html>
